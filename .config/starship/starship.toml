"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$conda\
$docker_context\
$cmd_duration\
$time\
$line_break\
$character"""

palette = 'github_dark'

[fill]
symbol = ' '

[username]
show_always = true
style_user = "fg:red"
style_root = "fg:red"
format = '[$user]($style)'

[hostname]
ssh_only = true
style = "fg:red"
format = '[@$hostname]($style)'

[directory]
style = "fg:peach"
format = ' [$path]($style) '
truncate_to_repo = false
truncation_length = 255

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "fg:yellow"
format = '[$symbol $branch]($style)'

[git_state]
style = "fg:yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\)'

[git_status]
style = "fg:yellow"
format = '[ $all_status$ahead_behind]($style)'

[c]
symbol = ""
style = "fg:green"
format = ' [$symbol $version]($style)'

[rust]
symbol = ""
style = "fg:green"
format = ' [$symbol $version]($style)'

[golang]
symbol = ""
style = "fg:green"
format = ' [$symbol $version]($style)'

[nodejs]
symbol = ""
style = "fg:green"
format = ' [$symbol $version]($style)'

[php]
symbol = ""
style = "fg:green"
format = ' [$symbol $version]($style)'

[java]
symbol = ""
style = "fg:green"
format = ' [$symbol $version]($style)'

[kotlin]
symbol = ""
style = "fg:green"
format = ' [$symbol $version]($style)'

[haskell]
symbol = ""
style = "fg:green"
format = ' [$symbol $version]($style)'

[python]
symbol = ""
style = "fg:green"
format = ' [$symbol $version(\($virtualenv\))]($style)'

[conda]
symbol = ""
style = "fg:sapphire"
format = ' [$symbol $environment]($style)'
ignore_base = false

[docker_context]
symbol = ""
style = "fg:sapphire"
format = ' [$symbol $context]($style)'

[cmd_duration]
show_milliseconds = true
style = "fg:lavender"
format = ' [$duration]($style)'
disabled = false
show_notifications = true
min_time_to_notify = 45000

[time]
disabled = false
time_format = "%I:%M %p"
style = "fg:lavender"
format = ' [$time]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[❯](fg:green)'
error_symbol = '[❯](fg:red)'
vimcmd_symbol = '[❮](fg:green)'
vimcmd_replace_one_symbol = '[❮](fg:lavender)'
vimcmd_replace_symbol = '[❮](fg:lavender)'
vimcmd_visual_symbol = '[❮](fg:yellow)'

# Custom gradient: #4e5eff → #62eac8 → #ffa447 (HSL interpolation)
# Segment flow: user → directory → git  ···fill···  languages → conda → time
[palettes.github_dark]
red = "#5966ff"
peach = "#56aff7"
yellow = "#5eeeec"
green = "#5dee88"
sapphire = "#b4f652"
lavender = "#ffa447"
mauve = "#d2a8ff"
pink = "#d2a8ff"
flamingo = "#56aff7"
maroon = "#5966ff"
rosewater = "#ffa447"
teal = "#5eeeec"
sky = "#5eeeec"
blue = "#56aff7"
text = "#e6edf3"
subtext1 = "#b1bac4"
subtext0 = "#8b949e"
overlay2 = "#6e7681"
overlay1 = "#484f58"
overlay0 = "#30363d"
surface2 = "#21262d"
surface1 = "#161b22"
surface0 = "#0d1117"
base = "#0d1117"
mantle = "#010409"
crust = "#010409"
