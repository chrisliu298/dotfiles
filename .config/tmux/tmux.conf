# ── General ──────────────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -s escape-time 10
set -sg repeat-time 600
set -s focus-events on
set -g mouse on
set -g history-limit 250000

# prefix: C-a (C-b also kept)
set -g prefix2 C-a
bind C-a send-prefix -2

setw -g mode-keys vi
set -g status-keys emacs

set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on
set -g set-titles on

# ── Terminal ─────────────────────────────────────────────────────

# undercurl & colored underline
set -as terminal-overrides ",xterm-256color:Smulx=\\E[4::%p1%dm"
set -as terminal-overrides ",xterm-256color:Setulc=\\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"

# synchronized output
set -as terminal-overrides ",xterm-256color:Sync=\\E[?2026%?%p1%{1}%-%tl%eh%;"
set -as terminal-overrides ",xterm-ghostty:Sync=\\E[?2026%?%p1%{1}%-%tl%eh%;"

# terminal features (RGB, clipboard, hyperlinks, etc.)
set -as terminal-features 'xterm-ghostty:RGB:sync:extkeys:clipboard:ccolour:cstyle:focus:usstyle:hyperlinks:osc7'
set -as terminal-features 'xterm-256color:RGB:sync:extkeys:clipboard:ccolour:cstyle:focus:usstyle:hyperlinks:osc7'

# passthrough & clipboard
set -g allow-passthrough on
set -s extended-keys on
set -g set-clipboard on

# ── Keybindings ──────────────────────────────────────────────────

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# split panes (retain current path)
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# pane navigation (vim-style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# window navigation
bind Tab last-window
bind -r C-h previous-window
bind -r C-l next-window

# swap windows
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# toggle mouse
bind m set mouse \; display "mouse #{?mouse,on,off}"

# reduce scroll speed (1 line per tick)
bind -T copy-mode WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 1 scroll-down
bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down

# ── Theme (GitHub Dark) ───────────────────────────────────────────
# Surfaces: #0d1117 (bg) → #161b22 (elevated) → #21262d (border)
# Text: #e6edf3 / #b1bac4 / #6e7681. Accent: #58a6ff blue.

# status bar — elevated surface like GitHub's header
set -g status-style "fg=#6e7681,bg=#161b22"
set -g status-left-length 32
set -g status-right-length 48

# left: session — blue pill, turns green on prefix
set -g status-left "#{?client_prefix,#[fg=#0d1117#,bg=#3fb950#,bold],#[fg=#0d1117#,bg=#58a6ff#,bold]} #S #[default] "

# right: time │ hostname
set -g status-right "#[fg=#6e7681]%H:%M #[fg=#30363d]│ #[fg=#b1bac4]#H "

# window tabs
setw -g window-status-format "#[fg=#6e7681] #I:#W "
setw -g window-status-current-format "#[fg=#58a6ff,bg=#21262d,bold] #I:#W #[default]"
setw -g window-status-last-style "fg=#b1bac4"
setw -g window-status-activity-style "fg=#d29922"
setw -g window-status-bell-style "fg=#ff7b72,bold"
setw -g window-status-separator ""

# pane borders
set -g pane-border-style "fg=#21262d"
set -g pane-active-border-style "fg=#58a6ff"

# messages
set -g message-style "fg=#e6edf3,bg=#161b22"
set -g message-command-style "fg=#58a6ff,bg=#161b22"

# copy mode — GitHub selection blue
setw -g mode-style "fg=#e6edf3,bg=#1b3a5c"

# clock
setw -g clock-mode-colour "#58a6ff"
setw -g clock-mode-style 24

# ── TPM ──────────────────────────────────────────────────────────

set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins"

# List plugins below:
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TPM (keep at the very bottom)
if "test -d ~/.config/tmux/plugins/tpm" "run -b '~/.config/tmux/plugins/tpm/tpm'"
