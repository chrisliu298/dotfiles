# GitHub Dark
# Surfaces: #0d1117 (bg) -> #161b22 (elevated) -> #21262d (border)
# Text: #e6edf3 / #b1bac4 / #6e7681. Accent: #58a6ff blue.

# status bar - elevated surface like GitHub's header
set -g status-style "fg=#6e7681,bg=#161b22"
set -g status-left-length 32
set -g status-right-length 48

# left: session - blue pill, turns green on prefix
set -g status-left "#{?client_prefix,#[fg=#0d1117#,bg=#3fb950#,bold],#[fg=#0d1117#,bg=#58a6ff#,bold]} #S #[default] "

# right: time | hostname
set -g status-right "#[fg=#6e7681]%I:%M %p #[fg=#30363d]│ #[fg=#b1bac4]#H "

# window tabs
setw -g window-status-format "#[fg=#6e7681] #I:#W "
setw -g window-status-current-format "#[fg=#58a6ff,bg=#21262d,bold] #I:#W #[default]"
setw -g window-status-last-style "fg=#b1bac4"
setw -g window-status-activity-style "fg=#d29922"
setw -g window-status-bell-style "fg=#ff7b72,bold"
setw -g window-status-separator ""

# pane borders
set -g pane-border-style "fg=#21262d"
set -g pane-active-border-style "fg=#58a6ff"

# messages
set -g message-style "fg=#e6edf3,bg=#161b22"
set -g message-command-style "fg=#58a6ff,bg=#161b22"

# copy mode - GitHub selection blue
setw -g mode-style "fg=#e6edf3,bg=#1b3a5c"

# clock
setw -g clock-mode-colour "#58a6ff"
setw -g clock-mode-style 12
