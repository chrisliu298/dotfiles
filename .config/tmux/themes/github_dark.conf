# GitHub Dark
# Surfaces: #0d1117 (bg) -> #161b22 (elevated) -> #21262d (border)
# Text: #e6edf3 / #b1bac4 / #6e7681. Accent: #ff9e00 neon orange (Tron Rinzler).
# Accent is off-palette on purpose: it only reads as neon against near-black, so
# the light theme keeps a deeper, readable gold rather than matching this.

# status bar - elevated surface like GitHub's header
set -g status-style "fg=#6e7681,bg=#161b22"
set -g status-left-length 32
set -g status-right-length 80

# CPU/RAM threshold colors (tmux-cpu). Muted while idle so the readout stays
# ambient, warning yellow then red only when load actually matters.
set -g @cpu_low_fg_color "#[fg=#6e7681]"
set -g @cpu_medium_fg_color "#[fg=#d29922]"
set -g @cpu_high_fg_color "#[fg=#ff7b72]"
set -g @ram_low_fg_color "#[fg=#6e7681]"
set -g @ram_medium_fg_color "#[fg=#d29922]"
set -g @ram_high_fg_color "#[fg=#ff7b72]"

# left: session - orange pill, turns green on prefix
set -g status-left "#{?client_prefix,#[fg=#0d1117#,bg=#3fb950#,bold],#[fg=#0d1117#,bg=#ff9e00#,bold]} #S #[default] "

# right: cpu | ram | time | hostname
set -g status-right "#[fg=#484f58]CPU #{cpu_fg_color}#{cpu_percentage}#[fg=#484f58] RAM #{ram_fg_color}#{ram_percentage} #[fg=#30363d]│ #[fg=#6e7681]%I:%M %p #[fg=#30363d]│ #[fg=#b1bac4]#H "

# window tabs - inactive windows surface their flags (bell, activity, zoom),
# the active window only needs the zoom marker
setw -g window-status-format "#[fg=#6e7681] #I:#W#{?window_flags,#[fg=#d29922]#{window_flags},} "
setw -g window-status-current-format "#[fg=#ff9e00,bg=#21262d,bold] #I:#W#{?window_zoomed_flag,#[fg=#e6edf3#,bold] Z,} #[default]"
setw -g window-status-last-style "fg=#b1bac4"
setw -g window-status-activity-style "fg=#d29922"
setw -g window-status-bell-style "fg=#ff7b72,bold"
setw -g window-status-separator ""

# pane borders
set -g pane-border-style "fg=#21262d"
set -g pane-active-border-style "fg=#ff9e00"

# messages
set -g message-style "fg=#e6edf3,bg=#161b22"
set -g message-command-style "fg=#ff9e00,bg=#161b22"

# copy mode - dim orange to match the accent
setw -g mode-style "fg=#e6edf3,bg=#4a2f06"

# clock
setw -g clock-mode-colour "#ff9e00"
setw -g clock-mode-style 12
