# GitHub Light
# Surfaces: #ffffff (bg) -> #eaeef2 (elevated) -> #d0d7de (border)
# Text: #1f2328 / #57606a / #6e7781. Accent: #9a7400 deep mustard yellow.

# status bar - elevated surface like GitHub's header
set -g status-style "fg=#57606a,bg=#eaeef2"
set -g status-left-length 32
set -g status-right-length 80

# CPU/RAM threshold colors (tmux-cpu). Muted while idle so the readout stays
# ambient, warning yellow then red only when load actually matters.
set -g @cpu_low_fg_color "#[fg=#6e7781]"
set -g @cpu_medium_fg_color "#[fg=#bf8700]"
set -g @cpu_high_fg_color "#[fg=#cf222e]"
set -g @ram_low_fg_color "#[fg=#6e7781]"
set -g @ram_medium_fg_color "#[fg=#bf8700]"
set -g @ram_high_fg_color "#[fg=#cf222e]"

# left: session - gold pill, turns green on prefix
set -g status-left "#{?client_prefix,#[fg=#ffffff#,bg=#1a7f37#,bold],#[fg=#ffffff#,bg=#9a7400#,bold]} #S #[default] "

# right: cpu | ram | time | hostname
set -g status-right "#[fg=#8c959f]CPU #{cpu_fg_color}#{cpu_percentage}#[fg=#8c959f] RAM #{ram_fg_color}#{ram_percentage} #[fg=#d0d7de]│ #[fg=#6e7781]%I:%M %p #[fg=#d0d7de]│ #[fg=#57606a]#H "

# window tabs - inactive windows surface their flags (bell, activity, zoom),
# the active window only needs the zoom marker
setw -g window-status-format "#[fg=#6e7781] #I:#W#{?window_flags,#[fg=#bf8700]#{window_flags},} "
setw -g window-status-current-format "#[fg=#9a7400,bg=#d0d7de,bold] #I:#W#{?window_zoomed_flag,#[fg=#1f2328#,bold] Z,} #[default]"
setw -g window-status-last-style "fg=#57606a"
setw -g window-status-activity-style "fg=#bf8700"
setw -g window-status-bell-style "fg=#cf222e,bold"
setw -g window-status-separator ""

# pane borders
set -g pane-border-style "fg=#d0d7de"
set -g pane-active-border-style "fg=#9a7400"

# messages
set -g message-style "fg=#1f2328,bg=#eaeef2"
set -g message-command-style "fg=#9a7400,bg=#eaeef2"

# copy mode - GitHub selection gold
setw -g mode-style "fg=#1f2328,bg=#fff4e0"

# clock
setw -g clock-mode-colour "#9a7400"
setw -g clock-mode-style 12
