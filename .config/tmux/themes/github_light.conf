# GitHub Light
# Surfaces: #ffffff (bg) -> #eaeef2 (elevated) -> #d0d7de (border)
# Text: #1f2328 / #57606a / #6e7781. Accent: #0969da blue.

# status bar - elevated surface like GitHub's header
set -g status-style "fg=#57606a,bg=#eaeef2"
set -g status-left-length 32
set -g status-right-length 48

# left: session - blue pill, turns green on prefix
set -g status-left "#{?client_prefix,#[fg=#ffffff#,bg=#1a7f37#,bold],#[fg=#ffffff#,bg=#0969da#,bold]} #S #[default] "

# right: time | hostname
set -g status-right "#[fg=#6e7781]%I:%M %p #[fg=#d0d7de]│ #[fg=#57606a]#H "

# window tabs
setw -g window-status-format "#[fg=#6e7781] #I:#W "
setw -g window-status-current-format "#[fg=#0969da,bg=#d0d7de,bold] #I:#W #[default]"
setw -g window-status-last-style "fg=#57606a"
setw -g window-status-activity-style "fg=#bf8700"
setw -g window-status-bell-style "fg=#cf222e,bold"
setw -g window-status-separator ""

# pane borders
set -g pane-border-style "fg=#d0d7de"
set -g pane-active-border-style "fg=#0969da"

# messages
set -g message-style "fg=#1f2328,bg=#eaeef2"
set -g message-command-style "fg=#0969da,bg=#eaeef2"

# copy mode - GitHub selection blue
setw -g mode-style "fg=#1f2328,bg=#ddf4ff"

# clock
setw -g clock-mode-colour "#0969da"
setw -g clock-mode-style 12
